<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed - Stripe Elements</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0a192f;
      --accent: #d4af37;
      --text-dark: #0f172a;
      --text-light: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --error: #ef4444;
      --error-bg: #fef2f2;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(10, 25, 47, 0.05);
      text-align: center;
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: 0 15px 35px rgba(10, 25, 47, 0.08);
    }

    .error-icon-wrap {
      width: 80px;
      height: 80px;
      background-color: var(--error-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--error);
      font-size: 2.5rem;
      animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleUp {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--error);
      margin: 0 0 10px;
    }

    .error-msg {
      color: var(--text-light);
      font-size: 0.95rem;
      margin: 0 0 30px;
      line-height: 1.6;
    }

    .details-list {
      list-style: none;
      padding: 0;
      margin: 0 0 30px;
      background: #f8fafc;
      border-radius: 12px;
      padding: 15px 20px;
      border: 1px dashed var(--border);
    }

    .details-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
      font-size: 0.9rem;
    }

    .details-item:last-child {
      border-bottom: none;
    }

    .details-label {
      color: var(--text-light);
      font-weight: 500;
    }

    .details-value {
      color: var(--text-dark);
      font-weight: 600;
    }

    .details-value.code-val {
      font-family: monospace;
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      background-color: var(--error-bg);
      color: var(--error);
    }

    .btn {
      display: block;
      background-color: var(--primary);
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: var(--transition);
      box-shadow: 0 4px 6px rgba(10, 25, 47, 0.15);
    }

    .btn:hover {
      background-color: #172a45;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(10, 25, 47, 0.2);
    }

    footer {
      margin-top: 30px;
      color: var(--text-light);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="error-icon-wrap">✕</div>
      <h1>Payment Failed</h1>
      <p class="error-msg" id="fail-description">Something went wrong during your payment check. Please see the details below or try again.</p>
      
      <ul class="details-list">
        <li class="details-item">
          <span class="details-label">Failure Status</span>
          <span class="badge" id="failure-status">Failed</span>
        </li>
        <li class="details-item">
          <span class="details-label">Order Reference</span>
          <span class="details-value code-val" id="order-ref">—</span>
        </li>
        <li class="details-item">
          <span class="details-label">Session ID</span>
          <span class="details-value code-val" id="session-ref">—</span>
        </li>
      </ul>

      <a href="test-payment.html" class="btn">Try Paying Again</a>
    </div>
  </div>

  <footer>
    <p>Powered by Stripe & NestJS Backend</p>
  </footer>

  <script>
    function parseErrorDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get('session_id') || 'N/A';
      const orderId = urlParams.get('order_id') || 'N/A';
      const status = urlParams.get('status') || 'failed';
      const reason = urlParams.get('reason');

      if (reason) {
        document.getElementById('fail-description').innerText = decodeURIComponent(reason);
      } else if (status) {
        document.getElementById('fail-description').innerText = `Your payment failed with checkout session status: "${status}".`;
      }

      document.getElementById('failure-status').innerText = status;
      document.getElementById('order-ref').innerText = orderId;
      document.getElementById('session-ref').innerText = sessionId;
    }

    parseErrorDetails();
  </script>

</body>
</html>
