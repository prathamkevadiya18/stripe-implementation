<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - Stripe Elements</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0a192f;
      --accent: #d4af37;
      --text-dark: #0f172a;
      --text-light: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --success: #10b981;
      --success-bg: #ecfdf5;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(10, 25, 47, 0.05);
      text-align: center;
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: 0 15px 35px rgba(10, 25, 47, 0.08);
    }

    .success-icon-wrap {
      width: 80px;
      height: 80px;
      background-color: var(--success-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--success);
      font-size: 2.5rem;
      animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleUp {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--primary);
      margin: 0 0 10px;
    }

    .success-msg {
      color: var(--text-light);
      font-size: 0.95rem;
      margin: 0 0 30px;
      line-height: 1.6;
    }

    .details-list {
      list-style: none;
      padding: 0;
      margin: 0 0 30px;
      background: #f8fafc;
      border-radius: 12px;
      padding: 15px 20px;
      border: 1px dashed var(--border);
    }

    .details-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
      font-size: 0.9rem;
    }

    .details-item:last-child {
      border-bottom: none;
    }

    .details-label {
      color: var(--text-light);
      font-weight: 500;
    }

    .details-value {
      color: var(--text-dark);
      font-weight: 600;
    }

    .details-value.code-val {
      font-family: monospace;
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      background-color: var(--success-bg);
      color: var(--success);
    }

    .btn {
      display: block;
      background-color: var(--primary);
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: var(--transition);
      box-shadow: 0 4px 6px rgba(10, 25, 47, 0.15);
    }

    .btn:hover {
      background-color: #172a45;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(10, 25, 47, 0.2);
    }

    .loader {
      border: 3px solid #cbd5e1;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    footer {
      margin-top: 30px;
      color: var(--text-light);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="container" id="loading-container">
    <div class="card">
      <h1>Verifying Payment</h1>
      <p class="success-msg">Please wait while we confirm your payment details with Stripe...</p>
      <div class="loader"></div>
    </div>
  </div>

  <div class="container" id="success-container" style="display: none;">
    <div class="card">
      <div class="success-icon-wrap">✓</div>
      <h1>Payment Successful</h1>
      <p class="success-msg">Your payment has been successfully completed. Thank you for your order!</p>

      <a href="test-payment.html" class="btn">Test Another Payment</a>
    </div>
  </div>

  <footer>
    <p>Powered by Stripe & NestJS Backend</p>
  </footer>

  <script>
    function verifyPayment() {
      document.getElementById('loading-container').style.display = 'none';
      document.getElementById('success-container').style.display = 'block';
    }

    verifyPayment();
  </script>

</body>
</html>
